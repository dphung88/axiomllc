  <!-- Camera body -->
  <rect x="10" y="20" width="32" height="24" rx="5" ry="5" fill="none" stroke="#c9a84c" stroke-width="3.5"/>
  <!-- Camera lens -->
  <circle cx="26" cy="32" r="7" fill="none" stroke="#c9a84c" stroke-width="3"/>
  <!-- Viewfinder triangle -->
